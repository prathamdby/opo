name: opo agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task for the agent to complete"
        required: true
        type: string
      branch:
        description: "Base branch to work from"
        required: false
        type: string
      opencode_version:
        description: "OpenCode version to install (e.g. v1.2.15)"
        required: false
        type: string
        default: "v1.2.15"
      dry_run:
        description: "Run agent without creating a PR"
        required: false
        type: boolean
        default: false

  issue_comment:
    types: [created]

jobs:
  agent:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/opo') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: opo-${{ github.event.issue.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # ── 1. Resolve task text and base branch ─────────────────────────────
      - name: Resolve task and base branch
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TASK: ${{ inputs.task }}
          DISPATCH_BRANCH: ${{ inputs.branch }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IS_PR: ${{ github.event.issue.pull_request && 'true' || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf '%s\n' "$DISPATCH_TASK" > "$RUNNER_TEMP/.opo-task"
            BASE="${DISPATCH_BRANCH:-$DEFAULT_BRANCH}"
            echo "mode=new" >> "$GITHUB_OUTPUT"
          else
            echo "$COMMENT_BODY" | sed 's|^/opo[[:space:]]*||' | head -n1 > "$RUNNER_TEMP/.opo-task"
            if [ -n "$IS_PR" ]; then
              PR_BRANCH=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${ISSUE_NUMBER}" --jq '.head.ref')
              if echo "$PR_BRANCH" | grep -q '^opo/'; then
                echo "mode=followup" >> "$GITHUB_OUTPUT"
                echo "pr_branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
                BASE="$PR_BRANCH"
              else
                echo "mode=new" >> "$GITHUB_OUTPUT"
                BASE="$DEFAULT_BRANCH"
              fi
            else
              echo "mode=new" >> "$GITHUB_OUTPUT"
              BASE="$DEFAULT_BRANCH"
            fi
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      # ── 2. Acknowledge trigger via reaction ───────────────────────────────
      - name: Acknowledge trigger
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='eyes'

      # ── 3. Validate task ──────────────────────────────────────────────────
      - name: Validate task
        run: |
          TASK=$(cat "$RUNNER_TEMP/.opo-task")
          if [ -z "$(echo "$TASK" | tr -d '[:space:]')" ]; then
            echo "::error::Task is empty. Provide a task description."
            exit 1
          fi
          if [ "${#TASK}" -gt 2000 ]; then
            echo "::error::Task exceeds 2000 characters. Be more concise."
            exit 1
          fi

      # ── 4. Validate required secret is present ───────────────────────────
      - name: Validate secrets
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: |
          if [ -z "$OPENCODE_ZEN_API_KEY" ]; then
            echo "::error::OPENCODE_ZEN_API_KEY secret is not set."
            echo "::error::Follow the setup steps at https://github.com/prathamdby/opo#setup to get your free API key."
            exit 1
          fi

      # ── 5. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.base }}
          fetch-depth: 50
          persist-credentials: false

      # ── 6. Install OpenCode CLI ───────────────────────────────────────────
      - name: Install OpenCode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_VERSION: ${{ inputs.opencode_version || 'v1.2.15' }}
        run: |
          gh release download "$OPENCODE_VERSION" --repo anomalyco/opencode \
            --pattern "opencode-linux-x64.tar.gz" \
            --dir /tmp/oc \
            --clobber
          tar -xzf /tmp/oc/opencode-linux-x64.tar.gz -C /tmp/oc
          sudo install -m 755 /tmp/oc/opencode /usr/local/bin/opencode

      # ── 7a. Run agent (primary, uses opencode.jsonc model) ───────────────
      - name: Run agent
        id: agent
        continue-on-error: true
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: opencode run "$(cat "$RUNNER_TEMP/.opo-task")"

      # ── 7b. Run agent fallback (only if primary failed) ───────────────────
      - name: Run agent (fallback)
        if: steps.agent.outcome == 'failure'
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: opencode run -m opencode/minimax-m2.5-free "$(cat "$RUNNER_TEMP/.opo-task")"

      # ── 8. Detect whether the agent changed anything ──────────────────────
      - name: Check for changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 8b. Generate PR title and body from the diff ─────────────────────
      - name: Generate PR metadata
        if: steps.diff.outputs.changed == 'true'
        id: pr-meta
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: |
          opencode run \
            "Run: git diff HEAD | cat
             Analyze the diff. Then write the file .opo-pr.json with this exact JSON structure:
             {\"title\": \"<conventional commit title>\", \"body\": \"<PR body>\"}
             Title rules: format is 'type: description', max 50 characters,
             types are feat/fix/refactor/docs/test/chore/style/perf, no scope, imperative mood.
             Body rules: mandatory blank line after the title, then bullet points starting with '-',
             capitalize first word of each bullet, no periods, no blank lines between bullets.
             Write only .opo-pr.json. Do not modify any other file."

          if [ -f .opo-pr.json ] && jq -e . .opo-pr.json > /dev/null 2>&1; then
            PR_TITLE=$(jq -r '.title' .opo-pr.json | cut -c1-256)
            DELIM=$(openssl rand -hex 8)
            {
              echo "pr_body<<${DELIM}"
              jq -r '.body' .opo-pr.json
              printf '\n\n---\n*Opened by [opo](https://github.com/prathamdby/opo)*\n'
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          else
            PR_TITLE=$(head -n1 "$RUNNER_TEMP/.opo-task" | cut -c1-256)
            DELIM=$(openssl rand -hex 8)
            {
              echo "pr_body<<${DELIM}"
              printf 'See the diff for changes.\n\n---\n*Opened by [opo](https://github.com/prathamdby/opo)*\n'
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          fi

          echo "pr_title=${PR_TITLE}" >> "$GITHUB_OUTPUT"
          rm -f .opo-pr.json

      # ── 9. Create a deterministic branch name ────────────────────────────
      - name: Create branch
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true && steps.resolve.outputs.mode != 'followup'
        id: branch
        run: |
          SLUG=$(cat "$RUNNER_TEMP/.opo-task" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs '[:alnum:]' '-' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-50)
          SHA=$(git rev-parse --short HEAD)
          BRANCH="opo/${SLUG}-${SHA}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 10. Commit all changes ─────────────────────────────────────────────
      - name: Commit changes
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        env:
          PR_TITLE: ${{ steps.pr-meta.outputs.pr_title }}
        run: |
          rm -f .opo-pr.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$PR_TITLE"

      # ── 11. Push branch ────────────────────────────────────────────────────
      - name: Push branch
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        id: push-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name || steps.resolve.outputs.pr_branch }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$BRANCH"

      # ── 12. Ensure the opo label exists in this repo ─────────────────────
      - name: Ensure opo label exists
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true && steps.resolve.outputs.mode != 'followup'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "opo" \
            --color "0075ca" \
            --description "Opened by the opo agent" \
            2>/dev/null || true

      # ── 13. Open pull request ────────────────────────────────────────────
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true && steps.resolve.outputs.mode != 'followup'
        id: open-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ steps.pr-meta.outputs.pr_title }}
          PR_BODY: ${{ steps.pr-meta.outputs.pr_body }}
          BASE: ${{ steps.resolve.outputs.base }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base "$BASE" \
            --head "$BRANCH" \
            --label "opo")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      # ── 14. Post PR link comment ─────────────────────────────────────────
      - name: Post PR link comment
        if: >-
          success() &&
          steps.diff.outputs.changed == 'true' &&
          github.event_name == 'issue_comment' &&
          inputs.dry_run != true &&
          steps.resolve.outputs.mode != 'followup'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.open-pr.outputs.pr_url }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="PR opened: $PR_URL"

      # ── 14b. Post follow-up comment ──────────────────────────────────────
      - name: Post follow-up comment
        if: >-
          success() &&
          steps.diff.outputs.changed == 'true' &&
          github.event_name == 'issue_comment' &&
          steps.resolve.outputs.mode == 'followup'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="Changes pushed to this PR."

      # ── 15. Post no-changes comment ──────────────────────────────────────
      - name: Post no-changes comment
        if: >-
          success() &&
          steps.diff.outputs.changed == 'false' &&
          github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="No changes needed for this task."

      # ── 16. Cleanup — delete remote branch on failure ────────────────────
      - name: Cleanup branch on failure
        if: failure() && steps.push-branch.outcome == 'success' && steps.resolve.outputs.mode != 'followup'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin --delete "$BRANCH" 2>/dev/null || true

      # ── 17. Post failure comment ─────────────────────────────────────────
      - name: Post failure comment
        if: failure() && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="Agent run failed. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
