name: opo agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task for the agent to complete"
        required: true
        type: string
      branch:
        description: "Base branch to work from"
        required: false
        type: string

  issue_comment:
    types: [created]

jobs:
  agent:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/opo') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 50
          persist-credentials: false

      - name: Run agent (Big Pickle)
        id: big-pickle
        continue-on-error: true
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          prompt: ${{ inputs.task || '' }}
          use_github_token: true

      - name: Run agent (MiniMax fallback)
        if: steps.big-pickle.outcome == 'failure'
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/minimax-m2.5-free
          prompt: ${{ inputs.task || '' }}
          use_github_token: true
