name: opo agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task for the agent to complete"
        required: true
        type: string
      branch:
        description: "Base branch to work from"
        required: false
        type: string

  issue_comment:
    types: [created]

jobs:
  agent:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/opo') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      # ── 1. Resolve task text and base branch ─────────────────────────────
      - name: Resolve task and base branch
        id: resolve
        env:
          DISPATCH_TASK: ${{ inputs.task }}
          DISPATCH_BRANCH: ${{ inputs.branch }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TASK="$DISPATCH_TASK"
            BASE="${DISPATCH_BRANCH:-$DEFAULT_BRANCH}"
          else
            # Strip the /opo prefix from the comment body; take the first line only
            TASK=$(echo "$COMMENT_BODY" | sed 's|^/opo[[:space:]]*||' | head -n1)
            BASE="$DEFAULT_BRANCH"
          fi
          DELIM=$(openssl rand -hex 8)
          {
            echo "task<<${DELIM}"
            printf '%s' "$TASK"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      # ── 2. Validate required secret is present ───────────────────────────
      - name: Validate secrets
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: |
          if [ -z "$OPENCODE_ZEN_API_KEY" ]; then
            echo "::error::OPENCODE_ZEN_API_KEY secret is not set."
            echo "::error::Follow the setup steps at https://github.com/prathamdby/opo#setup to get your free API key."
            exit 1
          fi

      # ── 3. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.base }}
          fetch-depth: 50
          persist-credentials: false

      # ── 4. Install OpenCode CLI ───────────────────────────────────────────
      - name: Install OpenCode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo anomalyco/opencode \
            --pattern "opencode-linux-x64.tar.gz" \
            --dir /tmp/oc \
            --clobber
          tar -xzf /tmp/oc/opencode-linux-x64.tar.gz -C /tmp/oc
          sudo install -m 755 /tmp/oc/opencode /usr/local/bin/opencode

      # ── 5a. Run agent — Big Pickle (primary) ─────────────────────────────
      - name: Run agent (Big Pickle)
        id: big-pickle
        continue-on-error: true
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          TASK: ${{ steps.resolve.outputs.task }}
        run: opencode run "$TASK"

      # ── 5b. Run agent — MiniMax fallback (only if Big Pickle failed) ──────
      - name: Run agent (MiniMax fallback)
        if: steps.big-pickle.outcome == 'failure'
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          TASK: ${{ steps.resolve.outputs.task }}
        run: opencode run -m opencode/minimax-m2.5-free "$TASK"

      # ── 6. Detect whether the agent changed anything ──────────────────────
      - name: Check for changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 6b. Generate PR title and body from the diff ─────────────────────
      - name: Generate PR metadata
        if: steps.diff.outputs.changed == 'true'
        id: pr-meta
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          TASK: ${{ steps.resolve.outputs.task }}
        run: |
          opencode run \
            "Run: git diff HEAD | cat
             Analyze the diff. Then write the file .opo-pr.json with this exact JSON structure:
             {\"title\": \"<conventional commit title>\", \"body\": \"<PR body>\"}
             Title rules: format is 'type: description', max 50 characters,
             types are feat/fix/refactor/docs/test/chore/style/perf, no scope, imperative mood.
             Body rules: mandatory blank line after the title, then bullet points starting with '-',
             capitalize first word of each bullet, no periods, no blank lines between bullets.
             Write only .opo-pr.json. Do not modify any other file."

          if [ -f .opo-pr.json ] && jq -e . .opo-pr.json > /dev/null 2>&1; then
            PR_TITLE=$(jq -r '.title' .opo-pr.json | cut -c1-256)
            DELIM=$(openssl rand -hex 8)
            {
              echo "pr_body<<${DELIM}"
              jq -r '.body' .opo-pr.json
              printf '\n\n---\n*Opened by [opo](https://github.com/prathamdby/opo)*'
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          else
            PR_TITLE=$(echo "$TASK" | head -n1 | cut -c1-256)
            DELIM=$(openssl rand -hex 8)
            {
              echo "pr_body<<${DELIM}"
              printf 'See the diff for changes.\n\n---\n*Opened by [opo](https://github.com/prathamdby/opo)*'
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          fi

          echo "pr_title=${PR_TITLE}" >> "$GITHUB_OUTPUT"
          rm -f .opo-pr.json

      # ── 7. Create a deterministic branch name ────────────────────────────
      - name: Create branch
        if: steps.diff.outputs.changed == 'true'
        id: branch
        env:
          TASK: ${{ steps.resolve.outputs.task }}
        run: |
          SLUG=$(echo "$TASK" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs '[:alnum:]' '-' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-50)
          SHA=$(git rev-parse --short HEAD)
          BRANCH="opo/${SLUG}-${SHA}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 8. Commit all changes ─────────────────────────────────────────────
      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        env:
          PR_TITLE: ${{ steps.pr-meta.outputs.pr_title }}
        run: |
          rm -f .opo-pr.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$PR_TITLE"

      # ── 9. Push branch ────────────────────────────────────────────────────
      - name: Push branch
        if: steps.diff.outputs.changed == 'true'
        id: push-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$BRANCH"

      # ── 10. Ensure the opo label exists in this repo ─────────────────────
      - name: Ensure opo label exists
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "opo" \
            --color "0075ca" \
            --description "Opened by the opo agent" \
            2>/dev/null || true

      # ── 11. Open pull request ────────────────────────────────────────────
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ steps.pr-meta.outputs.pr_title }}
          PR_BODY: ${{ steps.pr-meta.outputs.pr_body }}
          BASE: ${{ steps.resolve.outputs.base }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base "$BASE" \
            --head "$BRANCH" \
            --label "opo"

      # ── 12. Cleanup — delete remote branch on failure ────────────────────
      - name: Cleanup branch on failure
        if: failure() && steps.push-branch.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin --delete "$BRANCH" 2>/dev/null || true
